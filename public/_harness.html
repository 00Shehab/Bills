<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>harness</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="loginView" class="auth-view" hidden>
    <form id="loginForm" autocomplete="off">
      <input id="passInput" type="password" />
      <button type="submit" id="loginBtn">دخول</button>
      <p class="auth-error" id="loginError" hidden></p>
    </form>
  </div>
  <div id="pickView" class="auth-view" hidden>
    <div id="userButtons" class="user-buttons"></div>
    <button class="link-btn" id="backToLogin">رجوع</button>
  </div>
  <div id="appView" hidden>
    <header class="topbar">
      <div class="topbar-right">
        <button id="homeBtn" class="icon-btn">☰<span class="lbl"> الفواتير</span></button>
        <img class="topbar-logo" src="assets/alhashmi-logo.svg" alt="الهاشمي" />
        <span class="app-name">دفاتر الهاشمي</span>
      </div>
      <div class="topbar-left">
        <div class="add-wrap">
          <button id="addBtn" class="btn-primary" aria-haspopup="true" aria-expanded="false"><span class="plus">+</span><span class="lbl"> معاملة جديدة</span> <span class="caret">▾</span></button>
          <div id="addMenu" class="menu" hidden role="menu"></div>
        </div>
        <div class="bell-wrap">
          <button id="bellBtn" class="icon-btn bell" aria-label="التنبيهات">🔔<span id="bellCount" class="bell-count" hidden>0</span></button>
          <div id="bellMenu" class="menu bell-menu" hidden role="menu"></div>
        </div>
        <div class="user-box"><span id="currentUser" class="current-user"></span><button id="logoutBtn" class="icon-btn small">خروج</button></div>
      </div>
    </header>
    <main id="appMain"></main>
  </div>
  <div id="adminView" hidden></div>
  <div class="modal-overlay" id="confirmOverlay" hidden>
    <div class="modal confirm" role="alertdialog" aria-modal="true" aria-labelledby="confirmTitle">
      <div class="modal-head danger"><h2 id="confirmTitle">تأكيد</h2></div>
      <div class="confirm-body"><div class="warn-icon">⚠️</div><p id="confirmText"></p></div>
      <div class="modal-foot"><button type="button" id="confirmCancel" class="btn-ghost">إلغاء</button><button type="button" id="confirmOk" class="btn-danger">تأكيد</button></div>
    </div>
  </div>
  <div class="toast" id="toast" hidden></div>
  <div id="signatureView" class="signature-view" hidden>
    <div class="signature-bar">
      <button type="button" id="signatureCancel" class="btn-ghost">رجوع</button>
      <div><h2 id="signatureTitle">التوقيع</h2><p>اكتب توقيعك</p></div>
      <div class="signature-actions"><button type="button" id="signatureClear" class="btn-ghost">مسح</button><button type="button" id="signatureSave" class="btn-primary">حفظ</button></div>
    </div>
    <div class="signature-paper"><canvas id="signatureCanvas"></canvas></div>
  </div>

  <script>
    const J = (data, status = 200) => new Response(JSON.stringify(data), { status, headers: { 'Content-Type': 'application/json' } });
    const INV = { id:'inv_test', type:'rev', month:0, year:2026, meta:{}, created_by:'المحاسب', created_at:'2026-06-01T00:00:00Z' };
    const ROWS = [
      { id:'r1', position:0, data:{ shop:'محل البركة', rent:'1500', due:'2026-01-05', paid:'1500', voucher:'204' } },
      { id:'r2', position:1, data:{ shop:'مخبز الهدى', rent:'2000', due:'2026-01-05', paid:'1200', voucher:'205' } },
      { id:'r3', position:2, data:{ shop:'صيدلية النور', rent:'2500', due:'2026-01-10', paid:'2000', remaining:'450', voucher:'206' } },
    ];
    window.EventSource = class { constructor(){} close(){} addEventListener(){} removeEventListener(){} };
    let nrow = 100;
    window.fetch = async (url, opts = {}) => {
      const m = (opts.method || 'GET').toUpperCase();
      const p = String(url).split('?')[0];
      if (p === '/api/me') return J({ role:'user', user:'المحاسب' });
      if (p === '/api/invoices' && m === 'GET') return J({ invoices: [{ ...INV, count:3, total:4700 }] });
      if (p === '/api/invoices/inv_test' && m === 'GET') return J({ invoice: INV, rows: ROWS });
      if (p.startsWith('/api/activity')) return J({ items: [], unread: 0 });
      if (/\/rows$/.test(p) && m === 'POST') return J({ row: { id:'r'+(++nrow), position: (JSON.parse(opts.body||'{}').position)||0, data: JSON.parse(opts.body||'{}').data||{} } });
      return J({ ok: true });
    };
  </script>
  <script type="module">
    await import('./js/main.js');
    const iv = setInterval(() => {
      const card = document.querySelector('[data-open]');
      if (card) { clearInterval(iv); card.click(); }
    }, 80);
  </script>
</body>
</html>
