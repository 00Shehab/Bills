<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 420" role="img" aria-labelledby="title desc">
  <title id="title">شعار الهاشمي</title>
  <desc id="desc">شعار مجمع الهاشمي التجاري والسكني</desc>
  <defs>
    <linearGradient id="g" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#006338"/>
      <stop offset=".56" stop-color="#024626"/>
      <stop offset="1" stop-color="#0b6b3b"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" x2="1">
      <stop offset="0" stop-color="#9d7421"/>
      <stop offset=".48" stop-color="#d7b358"/>
      <stop offset="1" stop-color="#9a721d"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#06391f" flood-opacity=".15"/>
    </filter>
  </defs>
  <rect width="640" height="420" fill="none"/>
  <g transform="translate(225 30)" filter="url(#soft)">
    <!-- أبراج مسطّحة الأعلى — الأوسط الأطول (مثل الشعار) -->
    <rect x="78" y="38" width="58" height="152" rx="2" fill="url(#g)"/>
    <rect x="14" y="98" width="52" height="92" rx="2" fill="url(#g)"/>
    <rect x="146" y="84" width="52" height="106" rx="2" fill="url(#g)"/>
    <g fill="#f4faf2" opacity=".9">
      <rect x="92" y="56" width="30" height="7" rx="1"/>
      <rect x="92" y="72" width="30" height="7" rx="1"/>
      <rect x="92" y="88" width="30" height="7" rx="1"/>
      <rect x="92" y="104" width="30" height="7" rx="1"/>
      <rect x="26" y="114" width="28" height="7" rx="1"/>
      <rect x="26" y="130" width="28" height="7" rx="1"/>
      <rect x="26" y="146" width="28" height="7" rx="1"/>
      <rect x="158" y="100" width="28" height="7" rx="1"/>
      <rect x="158" y="116" width="28" height="7" rx="1"/>
      <rect x="158" y="132" width="28" height="7" rx="1"/>
    </g>
    <!-- الهلال الذهبي أسفل الأبراج -->
    <path d="M-2 184 C 56 212 156 212 214 184 C 158 201 54 201 -2 184 Z" fill="url(#gold)"/>
  </g>
  <text x="320" y="290" text-anchor="middle" direction="rtl" unicode-bidi="plaintext"
        font-family="DejaVu Sans, Tahoma, Arial, sans-serif" font-size="86" font-weight="700" fill="#064b2b">الهاشمي</text>
  <text x="320" y="343" text-anchor="middle" direction="rtl" unicode-bidi="plaintext"
        font-family="DejaVu Sans, Tahoma, Arial, sans-serif" font-size="29" font-weight="700" fill="#a67b24">مجمع الهاشمي التجاري والسكني</text>
  <g stroke="#064b2b" stroke-width="4" stroke-linecap="round" fill="none">
    <path d="M158 376h122"/>
    <path d="M360 376h122"/>
  </g>
  <text x="320" y="388" text-anchor="middle" direction="rtl" unicode-bidi="plaintext"
        font-family="DejaVu Sans, Tahoma, Arial, sans-serif" font-size="26" fill="#064b2b">الدرب - الشارع العام</text>
</svg>
